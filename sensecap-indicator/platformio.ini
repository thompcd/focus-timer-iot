; PlatformIO Configuration for SenseCAP Indicator
; ================================================
;
; Build and upload:
;   pio run -t upload
;
; Monitor serial:
;   pio device monitor

[env:sensecap_indicator]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; SenseCAP Indicator uses ESP32-S3 with specific flash/PSRAM config
board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
board_build.flash_mode = qio
board_build.flash_size = 8MB
board_build.partitions = default_8MB.csv

; USB CDC for serial output
build_flags = 
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue

; Libraries
lib_deps = 
    bodmer/TFT_eSPI@^2.5.0
    lvgl/lvgl@^8.3.0

; TFT_eSPI configuration for SenseCAP Indicator (480x480 ST7701S)
; You may need to create a custom User_Setup.h - see SETUP.md

; Upload settings
upload_speed = 921600
monitor_speed = 115200

; Extra scripts for partition handling
;extra_scripts = pre:extra_script.py
